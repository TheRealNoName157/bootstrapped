<!DOCTYPE html>
<html lang="sk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hack.net</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="d-flex align-items-center justify-content-center min-vh-100">

    <div class="hack-card p-4">
        <h1 class="text-center mb-4">Hack.net</h1>

        <form>
            <div class="mb-3">
                <label for="name" class="form-label">Name:</label>
                <input type="text" id="name" name="name" class="form-control hack-input">
            </div>
            <div class="mb-3">
                <label for="surname" class="form-label">Surname:</label>
                <input type="text" id="surname" name="surname" class="form-control hack-input">
            </div>
            <div class="mb-3">
                <label for="date" class="form-label">Date:</label>
                <input type="date" id="date" name="date" class="form-control hack-input">
            </div>
            <div class="mb-3">
                <label for="email" class="form-label">Email:</label>
                <input type="email" id="email" name="email" class="form-control hack-input">
            </div>
            <button type="submit" class="btn hack-btn w-100 mt-2">Submit</button>
        </form>

        <button type="button" id="btn" class="btn hack-btn w-100 mt-2">// hide links //</button>

        <a href="heelo.html" class="link-toggle d-block text-center mt-3 hack-link">// Hello world //</a>
        <a href="tips.html" class="link-toggle d-block text-center mt-2 hack-link">// Hack tips //</a>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
